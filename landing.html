<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulir Pemesanan Produk</title>
    <!-- Tailwind CSS untuk tampilan modern & responsif -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .loader {
            border: 3px solid #f3f3f3;
            border-radius: 50%;
            border-top: 3px solid #3498db;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-gray-50 font-sans antialiased text-gray-900">

    <div class="max-w-xl mx-auto my-10 p-6 bg-white rounded-xl shadow-md border border-gray-100">
        <!-- Header -->
        <div class="mb-6 text-center">
            <h2 class="text-2xl font-bold text-gray-800">Formulir Pembelian</h2>
            <p class="text-sm text-gray-500 mt-1">Silakan isi data diri Anda untuk melakukan pemesanan</p>
        </div>

        <!-- Notifikasi Status -->
        <div id="notification" class="hidden mb-5 p-4 rounded-lg text-sm font-medium"></div>

        <!-- Formulir Utama -->
        <form id="orderForm" onsubmit="handleSubmit(event)" class="space-y-4">
            
            <!-- Pilih Produk (Opsional / Bisa otomatis via parameter URL jika dikembangkan) -->
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Pilih Produk</label>
                <select id="product_name" name="product_name" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
                    <option value="">-- Pilih Produk --</option>
                    <option value="Produk A">Produk A - Rp 100.000</option>
                    <option value="Produk B">Produk B - Rp 150.000</option>
                </select>
            </div>

            <!-- Nama Pembeli -->
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Nama Lengkap</label>
                <input type="text" id="buyer_name" name="buyer_name" required placeholder="Contoh: Budi Santoso" 
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
            </div>

            <!-- WhatsApp -->
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Nomor WhatsApp</label>
                <input type="tel" id="buyer_phone" name="buyer_phone" required placeholder="Contoh: 081234567890" 
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
            </div>

            <!-- Alamat Pengiriman -->
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Alamat Lengkap</label>
                <textarea id="buyer_address" name="buyer_address" rows="3" required placeholder="Nama jalan, Nomor rumah, RT/RW, Kecamatan, Kota, Provinsi" 
                          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none"></textarea>
            </div>

            <!-- Tombol Submit -->
            <button type="submit" id="submitBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2.5 px-4 rounded-lg transition duration-200 shadow-sm flex items-center justify-center space-x-2 cursor-pointer">
                <span id="btnText">Kirim Pesanan Sekarang</span>
                <span id="btnLoader" class="loader hidden"></span>
            </button>
        </form>
    </div>

    <!-- Bagian Logika Script JavaScript -->
    <script>
        // CONFIGURATION: Ganti URL di bawah dengan Web App URL hasil Deploy Google Apps Script Anda!
        const CONFIG = {
            GAS_URL: "https://script.google.com/macros/s/AKfycb...MOHON_GANTI_DENGAN_URL_DEPLOY_ANDA.../exec"
        };

        // Fungsi utama saat form dikirim
        async function handleSubmit(event) {
            event.preventDefault(); // Mencegah reload halaman standar

            const form = document.getElementById('orderForm');
            const submitBtn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const btnLoader = document.getElementById('btnLoader');
            
            // Atur UI saat loading
            submitBtn.disabled = true;
            btnText.innerText = "Sedang Mengirim...";
            btnLoader.classList.remove('hidden');
            showNotification("", "hide");

            // Ambil data dari elemen form input
            const formData = new FormData(form);
            const payload = {
                id: "ORD-" + Date.now(), // Generate ID pesanan unik berbasis timestamp
                product_name: formData.get('product_name'),
                buyer_name: formData.get('buyer_name'),
                buyer_phone: formData.get('buyer_phone'),
                buyer_address: formData.get('buyer_address'),
                timestamp: new Date().toISOString()
            };

            // Mengirim data menggunakan fungsi syncToGAS dengan parameter action 'addOrder'
            const isSuccess = await syncToGAS('addOrder', payload);

            // Kembalikan UI Tombol ke semula
            submitBtn.disabled = false;
            btnLoader.classList.add('hidden');
            btnText.innerText = "Kirim Pesanan Sekarang";

            if (isSuccess) {
                showNotification("🎉 Pesanan Anda berhasil terkirim langsung ke server sistem!", "success");
                form.reset(); // Kosongkan form kembali setelah sukses
            } else {
                // Jika gagal (misal koneksi buruk), amankan data disimpan di localStorage (Antisipasi lokal)
                saveToLocalBackup(payload);
                showNotification("⚠️ Koneksi tidak stabil. Pesanan Anda telah diamankan di penyimpanan lokal perangkat dan akan disinkronkan berkala.", "warning");
            }
        }

        // Fungsi Kirim ke Google Apps Script via POST fetch
        async function syncToGAS(action, data) {
            const bodyParams = new URLSearchParams();
            bodyParams.append('action', action);
            
            // Loop data object dimasukkan ke format URLencoded form params
            for (let key in data) {
                if (data.hasOwnProperty(key)) {
                    bodyParams.append(key, data[key]);
                }
            }

            try {
                // Mengirim ke GAS menggunakan POST tanpa bentrok CORS browser (mode: no-cors)
                await fetch(CONFIG.GAS_URL, {
                    method: 'POST',
                    mode: 'no-cors', 
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded'
                    },
                    body: bodyParams
                });

                // Mode no-cors tidak mengembalikan isi body res, namun jika tidak lempar error berarti request masuk aman
                return true;
            } catch (error) {
                console.error("Gagal sinkronisasi data ke GAS: ", error);
                return false;
            }
        }

        // Fungsi Backup Data Lokal (Jika offline)
        function saveToLocalBackup(data) {
            let localOrders = JSON.parse(localStorage.getItem('backup_orders')) || [];
            localOrders.push(data);
            localStorage.setItem('backup_orders', JSON.stringify(localOrders));
        }

        // Fungsi helper mengontrol kotak notifikasi
        function showNotification(message, type) {
            const notif = document.getElementById('notification');
            if (type === "hide") {
                notif.classList.add('hidden');
                return;
            }
            
            notif.classList.remove('hidden', 'bg-green-100', 'text-green-800', 'bg-yellow-100', 'text-yellow-800');
            notif.innerText = message;

            if (type === "success") {
                notif.classList.add('bg-green-100', 'text-green-800');
            } else if (type === "warning") {
                notif.classList.add('bg-yellow-100', 'text-yellow-800');
            }
        }
    </script>
</body>
</html>
