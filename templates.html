<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Template Promosi - Kopi Affiliate</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
:root{--primary:#5D4037;--primary-light:#8D6E63;--primary-dark:#3E2723;--accent:#A1887F;--bg:#F5F3F0;--card-bg:#FFFFFF;--text:#2C2C2C;--text-light:#6B6B6B;--border:#E8E4E0;--success:#4CAF50;--danger:#E53935;--info:#2196F3;--shadow:0 4px 20px rgba(93,64,55,0.08);--radius:12px;--radius-sm:8px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);line-height:1.6}
.header{background:var(--card-bg);padding:1rem 2rem;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.header h1{font-size:1.25rem;color:var(--primary-dark)}
.container{max-width:1200px;margin:0 auto;padding:2rem}
.tabs{display:flex;gap:0.5rem;margin-bottom:1.5rem;flex-wrap:wrap}
.tab-btn{padding:0.5rem 1.25rem;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:var(--card-bg);cursor:pointer;font-family:inherit;font-size:0.9rem;font-weight:500;transition:all 0.3s}
.tab-btn.active{background:var(--primary);color:white;border-color:var(--primary)}
.tab-btn:hover:not(.active){border-color:var(--primary-light)}
.gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1.5rem}
.template-card{background:var(--card-bg);border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--border);overflow:hidden;transition:transform 0.3s,box-shadow 0.3s}
.template-card:hover{transform:translateY(-4px);box-shadow:0 8px 30px rgba(93,64,55,0.15)}
.template-preview{height:200px;background:var(--bg);display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
.template-preview img{width:100%;height:100%;object-fit:cover}
.template-preview video{width:100%;height:100%;object-fit:cover}
.template-preview .type-badge{position:absolute;top:10px;left:10px;padding:0.25rem 0.75rem;border-radius:20px;font-size:0.7rem;font-weight:600;background:rgba(0,0,0,0.6);color:white}
.template-preview .inactive-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;color:white;font-weight:600;font-size:1.1rem}
.template-info{padding:1.25rem}
.template-name{font-weight:600;font-size:1rem;margin-bottom:0.25rem;color:var(--primary-dark)}
.template-meta{font-size:0.8rem;color:var(--text-light);margin-bottom:1rem}
.template-actions{display:flex;gap:0.5rem;flex-wrap:wrap}
.btn{padding:0.5rem 1rem;border-radius:var(--radius-sm);border:none;font-weight:500;cursor:pointer;transition:all 0.3s;font-family:inherit;font-size:0.85rem;display:inline-flex;align-items:center;gap:0.4rem;text-decoration:none}
.btn-sm{padding:0.35rem 0.75rem;font-size:0.8rem}
.btn-primary{background:var(--primary);color:white}
.btn-primary:hover{background:var(--primary-dark)}
.btn-success{background:var(--success);color:white}
.btn-outline{background:transparent;border:1.5px solid var(--border);color:var(--text)}
.btn-outline:hover{border-color:var(--primary-light)}
.btn-danger{background:var(--danger);color:white}
.filter-bar{display:flex;gap:0.75rem;align-items:center;flex-wrap:wrap;margin-bottom:1.5rem}
.form-input,.form-select{width:100%;padding:0.6rem 0.875rem;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:inherit;font-size:0.9rem}
.form-input:focus,.form-select:focus{outline:none;border-color:var(--primary-light)}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:2000;display:none;align-items:center;justify-content:center;padding:1rem}
.modal-overlay.active{display:flex}
.modal{background:var(--card-bg);border-radius:var(--radius);max-width:500px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 10px 40px rgba(0,0,0,0.15)}
.modal-header{padding:1.25rem 1.5rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.modal-close{background:none;border:none;font-size:1.5rem;color:var(--text-light);cursor:pointer}
.modal-body{padding:1.5rem}
.modal-footer{padding:1rem 1.5rem;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:0.5rem}
.form-group{margin-bottom:1rem}
.form-label{display:block;font-weight:500;font-size:0.85rem;margin-bottom:0.4rem}

.file-upload-wrapper{border:2px dashed var(--border);border-radius:var(--radius);padding:1.5rem 1rem;text-align:center;cursor:pointer;transition:all 0.3s;background:var(--bg);position:relative;margin-bottom:1rem;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:120px}
.file-upload-wrapper input[type="file"]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;z-index:10}
.inline-preview{width:100%;max-height:180px;object-fit:contain;border-radius:var(--radius-sm);margin-bottom:0.5rem;display:none}
.inline-preview.show{display:block}

.toast-container{position:fixed;top:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:0.5rem}
.toast{background:var(--card-bg);border-radius:var(--radius-sm);padding:1rem 1.5rem;box-shadow:0 10px 40px rgba(93,64,55,0.12);border-left:4px solid var(--primary);display:flex;align-items:center;gap:0.75rem;animation:slideIn 0.3s ease;min-width:300px}
.toast.success{border-left-color:var(--success)}
.toast.error{border-left-color:var(--danger)}
.empty-state{text-align:center;padding:3rem;color:var(--text-light)}
.admin-bar{background:var(--primary-dark);color:white;padding:0.75rem 2rem;display:none;align-items:center;justify-content:space-between}
.admin-bar.show{display:flex}
.admin-bar a{color:white;text-decoration:none;font-size:0.85rem}
.admin-panel{background:var(--card-bg);border-radius:var(--radius);padding:1.5rem;margin-bottom:2rem;border:1px solid var(--border);display:none}
.admin-panel.show{display:block}
.status-toggle{width:40px;height:20px;border-radius:20px;background:#ccc;position:relative;cursor:pointer;transition:background 0.3s;display:inline-block}
.status-toggle.on{background:var(--success)}
.status-toggle::before{content:'';position:absolute;width:16px;height:16px;border-radius:50%;background:white;top:2px;left:2px;transition:transform 0.3s}
.status-toggle.on::before{transform:translateX(20px)}
.qr-preview{width:120px;height:120px;margin:0 auto}

.popup-preview-box{width:100%;text-align:center;padding:10px;background:#1e1e1e;border-radius:var(--radius-sm);max-height:350px;display:flex;align-items:center;justify-content:center;overflow:hidden}
.popup-preview-box img, .popup-preview-box video{max-width:100%;max-height:330px;object-fit:contain}

@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
@media(max-width:768px){.gallery-grid{grid-template-columns:repeat(2,1fr)}.container{padding:1rem}}
</style>
<base target="_blank">
</head>
<body>
<div class="toast-container" id="toastContainer"></div>

<div class="admin-bar" id="adminBar">
<span><i class="fas fa-user-shield"></i> Admin Mode</span>
<a href="index.html" target="_self"><i class="fas fa-arrow-left"></i> Kembali ke Dashboard</a>
</div>

<div class="header">
<h1><i class="fas fa-images" style="color:var(--primary)"></i> Template Promosi</h1>
<div style="display:flex;gap:0.75rem;align-items:center">
<span id="userInfo" style="font-size:0.85rem;color:var(--text-light)"></span>
<button class="btn btn-outline btn-sm" id="adminToggleBtn" style="display:none" onclick="toggleAdminPanel()"><i class="fas fa-cog"></i> Kelola</button>
<a href="index.html" target="_self" class="btn btn-outline btn-sm"><i class="fas fa-arrow-left"></i> Dashboard</a>
</div>
</div>

<div class="container">

<div class="admin-panel" id="adminPanel">
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
<h3 style="color:var(--primary-dark)"><i class="fas fa-cog"></i> Kelola Template</h3>
<button class="btn btn-primary btn-sm" onclick="openUploadModal()"><i class="fas fa-plus"></i> Upload Template Baru</button>
</div>
<div class="table-container" style="overflow-x:auto">
<table class="data-table" style="width:100%;border-collapse:collapse;font-size:0.85rem">
<thead><tr style="border-bottom:2px solid var(--border)"><th style="padding:0.75rem;text-align:left">Nama</th><th style="padding:0.75rem;text-align:left">Kategori</th><th style="padding:0.75rem;text-align:left">Tipe</th><th style="padding:0.75rem;text-align:left">Status</th><th style="padding:0.75rem;text-align:left">Aksi</th></tr></thead>
<tbody id="adminTemplatesBody"></tbody>
</table>
</div>
</div>

<div class="filter-bar">
<div class="tabs">
<button class="tab-btn active" onclick="filterTemplates('all')">Semua</button>
<button class="tab-btn" onclick="filterTemplates('image')"><i class="fas fa-image"></i> Gambar</button>
<button class="tab-btn" onclick="filterTemplates('video')"><i class="fas fa-video"></i> Video</button>
</div>
</div>

<div class="gallery-grid" id="galleryGrid"></div>

<div class="empty-state" id="emptyState" style="display:none">
<i class="fas fa-images" style="font-size:4rem;display:block;margin-bottom:1rem;opacity:0.3"></i>
<p>Belum ada template tersedia</p>
</div>

</div>

<div class="modal-overlay" id="uploadModal">
<div class="modal">
<div class="modal-header"><h3><i class="fas fa-cloud-upload-alt"></i> Upload Template</h3><button class="modal-close" onclick="closeModal('uploadModal')">&times;</button></div>
<div class="modal-body">
<form id="uploadForm" onsubmit="handleUpload(event)">
<div class="form-group"><label class="form-label">Nama Template</label><input type="text" class="form-input" id="tplName" required placeholder="Contoh: Banner Promo Kopi 1"></div>
<div class="form-row" style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
<div class="form-group"><label class="form-label">Kategori</label><select class="form-select" id="tplCategory"><option value="Banner">Banner</option><option value="Story">Story</option><option value="Feed">Feed</option><option value="Reels">Reels</option><option value="Lainnya">Lainnya</option></select></div>
<div class="form-group"><label class="form-label">Tipe File</label><select class="form-select" id="tplType"><option value="image">Gambar</option><option value="video">Video</option></select></div>
</div>
<div class="form-group">
<label class="form-label">File Template</label>
<div class="file-upload-wrapper" id="tplUploadWrap">
<input type="file" id="tplFile" accept="image/jpeg,image/png,image/gif,video/mp4,video/webm" onchange="handleTplFileSelect(this)" required>
<div id="uploadPlaceholder">
<i class="fas fa-cloud-upload-alt" style="font-size:2rem;color:var(--primary-light)"></i>
<p style="margin-top:0.5rem">Klik atau drag file</p>
<p style="font-size:0.75rem;color:var(--text-light)">JPG/PNG/GIF/MP4, max 10MB</p>
</div>
<img id="inlinePreview" class="inline-preview" alt="Preview">
<p id="tplFileName" style="font-size:0.8rem;color:var(--success);margin-top:0.5rem;font-weight:500;word-break:break-all"></p>
</div>

<div id="previewBtnContainer" style="display:none; text-align:center; margin-top:10px; margin-bottom:10px;">
  <button type="button" class="btn btn-outline" style="width:100%; border-color:var(--primary); color:var(--primary)" onclick="openFilePreviewPopup()"><i class="fas fa-eye"></i> LIHAT PREVIEW FILE TERPILIH</button>
</div>
</div>
</form>
</div>
<div class="modal-footer">
<button class="btn btn-outline" type="button" onclick="closeModal('uploadModal')">Batal</button>
<button class="btn btn-primary" type="submit" form="uploadForm"><i class="fas fa-upload"></i> Upload</button>
</div>
</div>
</div>

<div class="modal-overlay" id="popupPreviewModal" style="z-index: 3000;">
<div class="modal" style="max-width:420px;">
<div class="modal-header"><h3><i class="fas fa-file-image"></i> Preview File Terpilih</h3><button class="modal-close" onclick="closeModal('popupPreviewModal')">&times;</button></div>
<div class="modal-body">
  <div class="popup-preview-box" id="popupPreviewContent"></div>
</div>
<div class="modal-footer">
  <button class="btn btn-primary" style="width:100%" onclick="closeModal('popupPreviewModal')">Tutup Preview</button>
</div>
</div>
</div>

<div class="modal-overlay" id="downloadModal">
<div class="modal" style="max-width:450px">
<div class="modal-header"><h3><i class="fas fa-download"></i> Download Template</h3><button class="modal-close" onclick="closeModal('downloadModal')">&times;</button></div>
<div class="modal-body" style="text-align:center">
<div id="dlPreview" style="margin-bottom:1rem"></div>
<p style="font-size:0.85rem;color:var(--text-light);margin-bottom:0.5rem">QR Code + Link Referral akan otomatis ditambahkan:</p>
<div id="dlQR" class="qr-preview" style="margin-bottom:0.5rem"></div>
<p id="dlRefLink" style="font-size:0.8rem;color:var(--primary);word-break:break-all"></p>
</div>
<div class="modal-footer" style="justify-content:center">
<button class="btn btn-outline" onclick="closeModal('downloadModal')">Batal</button>
<button class="btn btn-success" id="btnConfirmDownload" onclick="confirmDownload()"><i class="fas fa-download"></i> Download</button>
</div>
</div>
</div>

<div id="hiddenQrContainer" style="display:none; width:300px; height:300px;"></div>

<script>
// ==================== CONFIG ====================
const CONFIG = {
GAS_URL: 'https://script.google.com/macros/s/AKfycbzXi0ZSoJAIqsF3J2rjR3B2G59jzdwvLDebjDXvh9m1XdFKu45qi8XeKrQ-lyszIT4/exec',
BASE_URL: 'https://affiliate.qcoid.com/landing.html'
};

var TEMPLATES = [];
var currentFilter = 'all';
var currentUser = null;
var selectedTemplate = null;
var currentPreviewObjectURL = null;
var currentPreviewType = 'image';

// ==================== SESSION ====================
function loadSession(){
var json = null;
var match = document.cookie.match(/aff_portal_session=([^;]+)/);
if(match){ try{ json = JSON.parse(decodeURIComponent(match[1])); }catch(e){} }
if(!json){
var ls = localStorage.getItem('aff_portal_session');
if(ls){ try{ json = JSON.parse(ls); }catch(e){} }
}
if(json && json.email){
currentUser = json;
if(json.isAdmin && String(json.isAdmin).toLowerCase() === 'true'){
document.getElementById('adminBar').classList.add('show');
document.getElementById('adminToggleBtn').style.display = 'inline-flex';
}
document.getElementById('userInfo').textContent = json.name || json.email || '';
}
}

function getRefCode(){
if(currentUser && currentUser.referralCode) return currentUser.referralCode;
var url = new URLSearchParams(window.location.search);
var r = url.get('ref') || url.get('referral') || '';
return r.toUpperCase();
}

// ==================== API ====================
async function fetchTemplates(){
try{
var res = await fetch(CONFIG.GAS_URL + '?action=getTemplates');
var data = await res.json();
if(data.success && Array.isArray(data.data)){
TEMPLATES = data.data.filter(function(t){ return String(t.active).toLowerCase() !== 'false'; });
renderGallery();
if(currentUser && currentUser.isAdmin) renderAdminList();
}
}catch(e){
showToast('Gagal memuat template', 'error');
}
}

// ==================== RENDER ====================
function renderGallery(){
var grid = document.getElementById('galleryGrid');
var empty = document.getElementById('emptyState');
var filtered = currentFilter === 'all' ? TEMPLATES : TEMPLATES.filter(function(t){ return (t.type || '').toLowerCase() === currentFilter; });

if(filtered.length === 0){
grid.style.display = 'none';
empty.style.display = 'block';
return;
}
grid.style.display = 'grid';
empty.style.display = 'none';

grid.innerHTML = filtered.map(function(t){
var isImg = (t.type || '').toLowerCase() === 'image';
var directUrl = getDirectImageUrl(t.url || t.driveurl || '');
var preview = isImg 
  ? `<img src="${directUrl}" onerror="this.parentNode.innerHTML='<i class=\"fas fa-image\" style=\"font-size:3rem;color:var(--primary-light)\"></i>${t.name || ''}'" alt="${t.name || ''}">` 
  : `<video src="${directUrl}" muted loop></video>`;
var typeLabel = isImg ? '<i class="fas fa-image"></i> Gambar' : '<i class="fas fa-video"></i> Video';
var overlay = String(t.active).toLowerCase() === 'false' ? '<div class="inactive-overlay">Non-Aktif</div>' : '';

return '<div class="template-card">' +
'<div class="template-preview">' + preview + '<span class="type-badge">' + typeLabel + '</span>' + overlay + '</div>' +
'<div class="template-info">' +
'<div class="template-name">' + (t.name || 'Template') + '</div>' +
'<div class="template-meta">' + (t.category || '-') + ' &middot; ' + formatDate(t.createdat || t.created_at || '') + '</div>' +
'<div class="template-actions">' +
'<button class="btn btn-primary btn-sm" onclick="openDownloadModal(\'' + (t.id || '') + '\')"><i class="fas fa-download"></i> Download</button>' +
'</div></div></div>';
}).join('');
}

function renderAdminList(){
var body = document.getElementById('adminTemplatesBody');
if(!body) return;
body.innerHTML = TEMPLATES.map(function(t){
var isImg = (t.type || '').toLowerCase() === 'image';
return '<tr style="border-bottom:1px solid var(--border)"><td style="padding:0.75rem">' + (t.name || '-') + '</td><td style="padding:0.75rem">' + (t.category || '-') + '</td><td style="padding:0.75rem">' + (isImg ? 'Gambar' : 'Video') + '</td><td style="padding:0.75rem"><span class="status-toggle ' + (String(t.active).toLowerCase() !== 'false' ? 'on' : '') + '" onclick="toggleTemplateStatus(\'' + (t.id || '') + '\')"></span></td><td style="padding:0.75rem"><button class="btn btn-sm btn-danger" onclick="deleteTemplate(\'' + (t.id || '') + '\')"><i class="fas fa-trash"></i></button></td></tr>';
}).join('') || '<tr><td colspan="5" style="text-align:center;padding:1rem;color:var(--text-light)">Belum ada template</td></tr>';
}

function filterTemplates(type){
currentFilter = type;
document.querySelectorAll('.tab-btn').forEach(function(b){ b.classList.remove('active'); });
if(event && event.target) event.target.classList.add('active');
renderGallery();
}

function toggleAdminPanel(){
document.getElementById('adminPanel').classList.toggle('show');
if(document.getElementById('adminPanel').classList.contains('show')) renderAdminList();
}

// ==================== HANDLERS UPLOAD & PREVIEW POPUP ====================
function openUploadModal(){ 
  document.getElementById('uploadModal').classList.add('active'); 
  document.getElementById('uploadForm').reset(); 
  document.getElementById('tplFileName').textContent = ''; 
  document.getElementById('uploadPlaceholder').style.display = 'block';
  document.getElementById('previewBtnContainer').style.display = 'none';
  document.getElementById('inlinePreview').classList.remove('show');
  document.getElementById('inlinePreview').src = '';
  if (currentPreviewObjectURL) {
    URL.revokeObjectURL(currentPreviewObjectURL);
    currentPreviewObjectURL = null;
  }
}

function handleTplFileSelect(input){
  var f = input.files[0];
  var btnContainer = document.getElementById('previewBtnContainer');
  var placeholder = document.getElementById('uploadPlaceholder');
  var inlinePreview = document.getElementById('inlinePreview');

  if (currentPreviewObjectURL) {
    URL.revokeObjectURL(currentPreviewObjectURL);
    currentPreviewObjectURL = null;
  }

  if(f){
    var sizeMB = f.size * 0.00000095367;
    document.getElementById('tplFileName').textContent = f.name + ' (' + sizeMB.toFixed(2) + ' MB)';

    currentPreviewObjectURL = URL.createObjectURL(f);
    currentPreviewType = f.type.includes('video') ? 'video' : 'image';

    placeholder.style.display = 'none'; 
    btnContainer.style.display = 'block';

    // Tampilkan preview inline langsung di area upload
    if(currentPreviewType === 'image'){
      inlinePreview.src = currentPreviewObjectURL;
      inlinePreview.classList.add('show');
    } else {
      inlinePreview.classList.remove('show');
    }
  } else {
    placeholder.style.display = 'block';
    btnContainer.style.display = 'none';
    inlinePreview.classList.remove('show');
    inlinePreview.src = '';
  }
}

function openFilePreviewPopup() {
  if(!currentPreviewObjectURL) return;
  var contentBox = document.getElementById('popupPreviewContent');
  contentBox.innerHTML = '<div style="color:#fff;padding:40px 20px;text-align:center"><i class="fas fa-spinner fa-spin" style="font-size:2rem"></i><p style="margin-top:10px">Memuat preview...</p></div>';
  document.getElementById('popupPreviewModal').classList.add('active');

  var el;
  if(currentPreviewType === 'video') {
    el = document.createElement('video');
    el.controls = true;
    el.autoplay = true;
    el.muted = true;
    el.style.maxWidth = '100%';
    el.style.maxHeight = '330px';
    el.style.objectFit = 'contain';
    el.onloadeddata = function() {
      contentBox.innerHTML = '';
      contentBox.appendChild(el);
    };
    el.onerror = function() {
      contentBox.innerHTML = '<div style="color:#fff;padding:40px 20px;text-align:center"><i class="fas fa-exclamation-circle" style="font-size:2rem;color:var(--danger)"></i><p style="margin-top:10px">Gagal memuat video</p></div>';
    };
  } else {
    el = document.createElement('img');
    el.style.maxWidth = '100%';
    el.style.maxHeight = '330px';
    el.style.objectFit = 'contain';
    el.style.display = 'block';
    el.style.margin = '0 auto';
    el.onload = function() {
      contentBox.innerHTML = '';
      contentBox.appendChild(el);
    };
    el.onerror = function() {
      contentBox.innerHTML = '<div style="color:#fff;padding:40px 20px;text-align:center"><i class="fas fa-exclamation-circle" style="font-size:2rem;color:var(--danger)"></i><p style="margin-top:10px">Gagal memuat gambar</p></div>';
    };
  }
  el.src = currentPreviewObjectURL;
}

async function handleUpload(e){
e.preventDefault();
var name = document.getElementById('tplName').value.trim();
var category = document.getElementById('tplCategory').value;
var type = document.getElementById('tplType').value;
var file = document.getElementById('tplFile').files[0];

if(!file){ showToast('Pilih file template', 'error'); return; }
if(file.size > 10 * 1024 * 1024){ showToast('File max 10MB', 'error'); return; }

closeModal('uploadModal');
showToast('Mengupload template...', 'info');

try{
var base64 = await fileToBase64(file);
var payload = {
  action: 'saveTemplate',
  name: name,
  category: category,
  type: type,
  filename: file.name,
  mimeType: file.type || (type === 'image' ? 'image/jpeg' : 'video/mp4'),
  base64: base64
};

var formBody = [];
for (var property in payload) {
  formBody.push(encodeURIComponent(property) + "=" + encodeURIComponent(payload[property]));
}
formBody = formBody.join("&");

var response = await fetch(CONFIG.GAS_URL, {
  method: 'POST',
  headers: { 'Content-Type': 'application/x-www-form-urlencoded;charset=UTF-8' },
  body: formBody
});

var resData = await response.json();
if(resData.success){
  showToast('Template berhasil diupload!', 'success');
  fetchTemplates();
} else {
  showToast('Gagal upload: ' + (resData.message || ''), 'error');
}
}catch(err){
  showToast('Gagal upload: ' + (err.message || ''), 'error');
}
}

// ==================== DOWNLOAD & SERVER-SIDE PROXY ====================
function openDownloadModal(tplId){
var t = TEMPLATES.find(function(x){ return String(x.id) === String(tplId); });
if(!t) return;
selectedTemplate = t;

var ref = getRefCode();
var link = CONFIG.BASE_URL + (ref ? '?ref=' + encodeURIComponent(ref) : '');
var isImg = (t.type || '').toLowerCase() === 'image';

var directUrl = getDirectImageUrl(t.url || t.driveurl || '');
document.getElementById('dlPreview').innerHTML = isImg 
  ? '<img src="' + directUrl + '" style="max-width:100%;max-height:250px;border-radius:var(--radius-sm)">' 
  : '<video src="' + directUrl + '" style="max-width:100%;max-height:250px;border-radius:var(--radius-sm)" controls muted></video>';

document.getElementById('dlQR').innerHTML = '';
if(ref){
new QRCode(document.getElementById('dlQR'), { text: link, width: 120, height: 120 });
document.getElementById('dlRefLink').textContent = link;
} else {
document.getElementById('dlQR').innerHTML = '<p style="font-size:0.75rem;color:var(--text-light)">Login untuk otomatis sematkan QR & referral</p>';
document.getElementById('dlRefLink').textContent = '';
}
document.getElementById('downloadModal').classList.add('active');
}

function getGoogleDriveId(url) {
  if (!url) return '';
  var match = url.match(/id=([^&]+)/) || url.match(/\/d\/([^/]+)/);
  return (match && match[1]) ? match[1] : '';
}

function getDirectImageUrl(url) {
  if (!url) return '';
  // If already a direct URL, return as-is
  if (url.indexOf('googleusercontent.com') !== -1) return url;
  if (url.indexOf('drive.google.com/uc?') !== -1) return url;

  var driveId = getGoogleDriveId(url);
  if (driveId) {
    // Use Google Drive direct viewer URL for images
    return 'https://drive.google.com/uc?export=view&id=' + driveId;
  }
  return url;
}

async function confirmDownload(){
if(!selectedTemplate) return;
var ref = getRefCode();
var isImg = (selectedTemplate.type || '').toLowerCase() === 'image';
var fileUrl = getDirectImageUrl(selectedTemplate.url || selectedTemplate.driveurl || '');
var extension = isImg ? '.jpg' : '.mp4';
var fileName = (selectedTemplate.name || 'template') + (ref ? '_' + ref : '') + extension;

closeModal('downloadModal');

if(isImg && ref){
showToast('Mengambil data GDrive via Server Proxy...', 'info');
try{
  var driveId = getGoogleDriveId(fileUrl);
  var localDataUrl = '';

  if(driveId) {
    var proxyRes = await fetch(CONFIG.GAS_URL + '?action=getDriveBlobBase64&id=' + encodeURIComponent(driveId));
    var proxyData = await proxyRes.json();
    if(proxyData.success && proxyData.base64) {
      localDataUrl = 'data:' + (proxyData.mimeType || 'image/jpeg') + ';base64,' + proxyData.base64;
    } else {
      throw new Error(proxyData.message || 'Gagal bypass proxy server');
    }
  } else {
    var res = await fetch(fileUrl);
    var blob = await res.blob();
    localDataUrl = URL.createObjectURL(blob);
  }

  showToast('Menyisipkan Watermark pada file...', 'info');
  var canvas = await addWatermarkToImage(localDataUrl, ref);
  
  var a = document.createElement('a');
  a.target = '_self'; 
  a.download = fileName;
  a.href = canvas.toDataURL('image/jpeg', 0.95);
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  
  if(!driveId) URL.revokeObjectURL(localDataUrl); 
  showToast('Download Sukses dengan Watermark!', 'success');
}catch(e){
  console.error(e);
  showToast('Gagal bypass proxy, mendownload file asli...', 'error');
  triggerDirectDownload(fileUrl, fileName);
}
} else {
showToast('Mengunduh file...', 'info');
triggerDirectDownload(fileUrl, fileName);
}
}

async function triggerDirectDownload(url, filename) {
try {
  var driveId = getGoogleDriveId(url);
  var cleanUrl = url;
  if(driveId) {
    cleanUrl = 'https://docs.google.com/uc?export=download&id=' + driveId;
  }
  var a = document.createElement('a');
  a.target = '_self'; 
  a.href = cleanUrl;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
} catch (e) {
  showToast('Gagal mengunduh file', 'error');
}
}

async function addWatermarkToImage(localImgUrl, refCode){
return new Promise(function(resolve, reject){
var img = new Image();
img.onload = function(){
try {
var canvas = document.createElement('canvas');
canvas.width = img.width;
canvas.height = img.height;
var ctx = canvas.getContext('2d');

ctx.drawImage(img, 0, 0);

var barHeight = Math.max(95, img.height * 0.13);
ctx.fillStyle = '#FFFFFF';
ctx.fillRect(0, img.height - barHeight, img.width, barHeight);

ctx.strokeStyle = '#E8E4E0';
ctx.lineWidth = 2;
ctx.beginPath();
ctx.moveTo(0, img.height - barHeight);
ctx.lineTo(img.width, img.height - barHeight);
ctx.stroke();

var qrContainer = document.getElementById('hiddenQrContainer');
qrContainer.innerHTML = '';
var qrSize = Math.round(barHeight * 0.82);

new QRCode(qrContainer, {
  text: CONFIG.BASE_URL + '?ref=' + refCode,
  width: qrSize,
  height: qrSize,
  colorDark: '#000000',
  colorLight: '#FFFFFF',
  correctLevel: QRCode.CorrectLevel.H
});

setTimeout(function(){
  try {
    var qrImgEl = qrContainer.querySelector('img');
    if(qrImgEl && qrImgEl.src){
      var qrImg = new Image();
      qrImg.onload = function() {
        var qrX = img.width - qrSize - Math.round(barHeight * 0.1);
        var qrY = img.height - barHeight + Math.round((barHeight - qrSize) / 2);
        
        ctx.drawImage(qrImg, qrX, qrY, qrSize, qrSize);

        ctx.fillStyle = '#000000';
        var fontSize = Math.max(14, Math.round(img.width * 0.018));
        ctx.font = 'bold ' + fontSize + 'px Inter, sans-serif';
        ctx.textBaseline = 'middle';
        
        var linkText = 'Pesan di: ' + CONFIG.BASE_URL + '?ref=' + refCode;
        ctx.fillText(linkText, Math.round(barHeight * 0.2), img.height - barHeight / 2);

        resolve(canvas);
      };
      qrImg.src = qrImgEl.src;
    } else {
      throw new Error('QR generation failed');
    }
  } catch(innerErr) {
    reject(innerErr);
  }
}, 350);

} catch(canvasErr) {
  reject(canvasErr);
}
};
img.onerror = function(err) { reject(err); };
img.src = localImgUrl;
});
}

// ==================== ACTIONS ====================
async function toggleTemplateStatus(tplId){
var t = TEMPLATES.find(function(x){ return String(x.id) === String(tplId); });
if(!t) return;
var newActive = String(t.active).toLowerCase() === 'false' ? 'true' : 'false';
try{
var res = await fetch(CONFIG.GAS_URL + '?action=saveTemplate&id=' + encodeURIComponent(tplId) + '&name=' + encodeURIComponent(t.name || '') + '&category=' + encodeURIComponent(t.category || '') + '&type=' + encodeURIComponent(t.type || '') + '&active=' + newActive);
var data = await res.json();
if(data.success){
t.active = newActive;
renderGallery();
renderAdminList();
showToast('Status template diperbarui', 'success');
}
}catch(e){ showToast('Gagal update status', 'error'); }
}

async function deleteTemplate(tplId){
if(!confirm('Hapus template ini secara permanen?')) return;
try{
var res = await fetch(CONFIG.GAS_URL + '?action=deleteTemplate&id=' + encodeURIComponent(tplId));
var data = await res.json();
if(data.success){
TEMPLATES = TEMPLATES.filter(function(x){ return String(x.id) !== String(tplId); });
renderGallery();
renderAdminList();
showToast('Template dihapus', 'success');
}
}catch(e){ showToast('Gagal hapus template', 'error'); }
}

// ==================== UTILS ====================
function fileToBase64(file){
return new Promise(function(resolve, reject){
var r = new FileReader();
r.onload = function(e){ resolve(e.target.result.split(',')[1]); };
r.onerror = reject;
r.readAsDataURL(file);
});
}

function formatDate(d){
if(!d) return '-';
var x = new Date(d);
return isNaN(x.getTime()) ? String(d) : x.toLocaleDateString('id-ID', {day:'2-digit', month:'short', year:'numeric'});
}

function closeModal(id){ document.getElementById(id).classList.remove('active'); }

function showToast(msg, type){
var c = document.getElementById('toastContainer');
var t = document.createElement('div');
t.className = 'toast ' + (type || '');
var icons = {success:'check-circle', error:'times-circle', info:'info-circle'};
t.innerHTML = '<i class="fas fa-' + (icons[type] || 'info-circle') + '\"></i><span>' + msg + '</span>';
c.appendChild(t);
setTimeout(function(){ t.remove(); }, 4000);
}

document.addEventListener('DOMContentLoaded', function(){
loadSession();
fetchTemplates();
});
